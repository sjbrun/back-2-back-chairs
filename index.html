<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Back-to-Back Chairs</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#fdf3e0;font-family:sans-serif;touch-action:none}
  #hint{position:fixed;top:6px;left:50%;transform:translateX(-50%);font-size:14px;color:#8a6d3b;z-index:5}
  #room{position:relative;width:100%;height:100%}
  .decoy{position:absolute;font-size:60px;user-select:none;cursor:default;transform:translate(-50%,-50%)}
  .decoy.shake{animation:shake .3s}
  @keyframes shake{25%{transform:translate(-50%,-50%) rotate(-8deg)}75%{transform:translate(-50%,-50%) rotate(8deg)}}

  .chair{position:absolute;width:70px;height:70px;touch-action:none;cursor:grab}
  .chair .seat{position:absolute;bottom:0;left:0;width:70px;height:44px;background:#d99a55;border-radius:8px;box-shadow:inset 0 -4px 0 rgba(0,0,0,.15)}
  .chair .back{position:absolute;top:0;left:8px;width:54px;height:28px;background:#8a5a2b;border-radius:8px 8px 2px 2px}
  .chair .handle{position:absolute;top:-22px;left:50%;width:18px;height:18px;margin-left:-9px;
    border-radius:50%;background:#ffd447;border:2px solid #b8860b;cursor:grab}
  .chair.matched{pointer-events:none}
  .chair.fly{animation:fly .6s forwards}
  @keyframes fly{
    0%{transform:translate(-50%,-50%) scale(1)}
    100%{transform:translate(-50%,-1200%) scale(2) rotate(360deg);opacity:0}
  }

  .spark{position:absolute;width:10px;height:10px;border-radius:50%;pointer-events:none}
  @keyframes burst{to{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
  #celebrate{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);
    color:#fff;text-align:center;padding-top:15vh;font-size:42px;z-index:10}
  #celebrate button{display:block;margin:30px auto;font-size:28px;padding:12px 28px;
    border-radius:16px;border:none;background:#ffd447;cursor:pointer}
  .confetti{position:fixed;top:-20px;width:12px;height:12px;pointer-events:none;z-index:11}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style>
</head>
<body>
<div id="hint">Drag a chair to move it. Drag its little knob to spin it. Touch backs together to pop!</div>
<div id="room"></div>

<div id="celebrate">
  🎉 You cleared the room! 🎉
  <button onclick="location.reload()">Play Again</button>
</div>

<script>
const room = document.getElementById('room');
const CHAIR_COUNT = 6; // must be even
const DECOYS = ['🪴','🖼️','📦'];
const COLORS = ['#ff5252','#ffca28','#66bb6a','#42a5f5','#ab47bc','#ff7043'];
const TOUCH_DIST = 95;
const ANGLE_TOL = 35;
const DOT_TOL = 0.7;

const roomRect = room.getBoundingClientRect();
function roomPoint(evt){ return { x: evt.clientX - roomRect.left, y: evt.clientY - roomRect.top }; }
function backVector(angleDeg){
  const r = angleDeg * Math.PI/180;
  return { x: Math.sin(r), y: -Math.cos(r) };
}

let spots = [];
for (let i=0;i<20;i++){
  spots.push({ x: (10+Math.random()*80)/100*roomRect.width, y: (16+Math.random()*70)/100*roomRect.height });
}
spots.sort(()=>Math.random()-0.5);

let remaining = CHAIR_COUNT;
const chairs = [];

for (let i=0;i<CHAIR_COUNT;i++){
  const el = document.createElement('div');
  el.className = 'chair';
  el.innerHTML = '<div class="seat"></div><div class="back"></div><div class="handle"></div>';
  room.appendChild(el);
  const chair = { el, x: spots[i].x, y: spots[i].y, angle: Math.random()*360, matched:false };
  chairs.push(chair);
  updateTransform(chair);

  const handle = el.querySelector('.handle');
  handle.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    handle.setPointerCapture(e.pointerId);
    const onMove = ev=>{
      const p = roomPoint(ev);
      const dx = p.x - chair.x, dy = p.y - chair.y;
      chair.angle = (Math.atan2(dy,dx)*180/Math.PI + 90 + 360) % 360;
      updateTransform(chair);
    };
    const onUp = ev=>{
      handle.releasePointerCapture(e.pointerId);
      handle.removeEventListener('pointermove', onMove);
      handle.removeEventListener('pointerup', onUp);
      tryMatch(chair);
    };
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp);
  });

  el.addEventListener('pointerdown', e=>{
    if (e.target === handle || chair.matched) return;
    el.setPointerCapture(e.pointerId);
    const p0 = roomPoint(e);
    const offset = { x: p0.x - chair.x, y: p0.y - chair.y };
    const onMove = ev=>{
      const p = roomPoint(ev);
      chair.x = p.x - offset.x;
      chair.y = p.y - offset.y;
      updateTransform(chair);
    };
    const onUp = ev=>{
      el.releasePointerCapture(e.pointerId);
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      tryMatch(chair);
    };
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
  });
}

for (let i=0;i<DECOYS.length;i++){
  const d = document.createElement('div');
  d.className = 'decoy';
  d.textContent = DECOYS[i];
  const s = spots[CHAIR_COUNT+i];
  d.style.left = s.x+'px'; d.style.top = s.y+'px';
  d.addEventListener('click', ()=>{ d.classList.remove('shake'); void d.offsetWidth; d.classList.add('shake'); });
  room.appendChild(d);
}

function updateTransform(chair){
  chair.el.style.left = chair.x+'px';
  chair.el.style.top = chair.y+'px';
  chair.el.style.transform = `translate(-50%,-50%) rotate(${chair.angle}deg)`;
}

function tryMatch(chair){
  for (const other of chairs){
    if (other === chair || other.matched) continue;
    const dx = other.x - chair.x, dy = other.y - chair.y;
    const dist = Math.hypot(dx,dy);
    if (dist > TOUCH_DIST) continue;

    const rel = ((chair.angle - other.angle) % 360 + 360) % 360;
    if (Math.abs(rel-180) > ANGLE_TOL) continue;

    const dirAB = { x: dx/dist, y: dy/dist };
    const dirBA = { x: -dx/dist, y: -dy/dist };
    const backA = backVector(chair.angle), backB = backVector(other.angle);
    const dotA = backA.x*dirAB.x + backA.y*dirAB.y;
    const dotB = backB.x*dirBA.x + backB.y*dirBA.y;
    if (dotA < DOT_TOL || dotB < DOT_TOL) continue;

    matchPair(chair, other);
    return;
  }
}

function matchPair(a,b){
  a.matched = b.matched = true;
  firework(a.el); firework(b.el);
  a.el.classList.add('matched','fly');
  b.el.classList.add('matched','fly');
  setTimeout(()=>{
    a.el.remove(); b.el.remove();
    remaining -= 2;
    if (remaining === 0) celebrate();
  }, 600);
}

function firework(el){
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
  for (let i=0;i<18;i++){
    const s = document.createElement('div');
    s.className = 'spark';
    const angle = Math.random()*2*Math.PI;
    const dist = 60+Math.random()*80;
    s.style.setProperty('--dx', Math.cos(angle)*dist+'px');
    s.style.setProperty('--dy', Math.sin(angle)*dist+'px');
    s.style.left = cx+'px';
    s.style.top = cy+'px';
    s.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
    s.style.animation = 'burst .7s ease-out forwards';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 700);
  }
}

function celebrate(){
  document.getElementById('celebrate').style.display = 'block';
  const confettiInterval = setInterval(()=>{
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
    c.style.animation = `fall ${1.5+Math.random()*1.5}s linear forwards`;
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 3200);
  }, 120);
  setTimeout(()=>clearInterval(confettiInterval), 15000);
}
</script>
</body>
</html>
